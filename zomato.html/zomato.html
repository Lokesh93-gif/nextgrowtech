<!DOCTYPE html>
<html>
    <head>
        <title>Zomato clone</title>
        <link rel="stylesheet" href="zomatostylesheet.css">
    </head>
    <body>
        <div class="zomato">
            <div class="video-container">
                <video autoplay muted loop>
          <source src="food 3.mp4" type="video/mp4">
                </video>
                
                <div class="zomato-logo">
                        <img src="	https://b.zmtcdn.com/web_assets/8313a97515fcb0447d2d77c276532a511583262271.png" alt="zomato logo">
                        <h1>India's #1 food Deliveryapp </h1>
                           <p> Experience fast & easy online ordering <br>
                            on the Zomato app
                           </p>
                           <div class="app-buttons">
                            <a href="#" class="store-btn">
                                <img src="	https://b.zmtcdn.com/data/o2_assets/aad864bd17860b27634fe621001c32db1739350431.png" alt="Google Play">
                            </a>
                            <a href="#" class="store-btn">
                                <img src="https://b.zmtcdn.com/data/o2_assets/df6464de32f4a09262cee301f65aaa661739351256.png" alt="App Store">
                            </a>
                            </div>
                            <section class="better-food">
                                <div class="content">
                                    <h2>Better food for <br>More People</h2>
                                    <p>For over a decade, we've enabled our <br>
                                    customers to discover new tastes, <br>
                                delivery right to their doorstep
                            </p>
                                </div>
                            </section>
                            <section class="white-box">
                                <!--floating food images-->
                                <img src="	https://b.zmtcdn.com/data/o2_assets/110a09a9d81f0e5305041c1b507d0f391743058910.png" class="food burger">
                                <img src="	https://b.zmtcdn.com/data/o2_assets/316495f4ba2a9c9d9aa97fed9fe61cf71743059024.png" class="food pizza">
                                <img src="	https://b.zmtcdn.com/data/o2_assets/b4f62434088b0ddfa9b370991f58ca601743060218.png" class="food momos">
                            </section>
                            </div>
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
